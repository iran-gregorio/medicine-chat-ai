<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MediCare AI Dashboard</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Tailwind Config for fonts and specific colors -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dashboard-dark': '#0b1120',
            'dashboard-sidebar': '#080c16',
            'card-bg': 'rgba(255, 255, 255, 0.05)',
            'card-border': 'rgba(255, 255, 255, 0.1)',
            'accent-blue': '#3b82f6',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for Effects -->
<style data-purpose="background-effects">
    body {
      background-color: #0b1120;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
    /* Subtle radial gradient to mimic the background in the image */
    .bg-main-gradient {
      background: radial-gradient(circle at 50% 50%, #111d35 0%, #0b1120 100%);
    }
  </style>
<style data-purpose="card-glow-effects">
    /* Glowing effect for the primary action cards */
    .glow-card {
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    .glow-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, transparent, #2563eb, transparent);
      z-index: -1;
      filter: blur(15px);
      opacity: 0.6;
    }
    .glow-card:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden">
<!-- BEGIN: LeftSidebar -->
<aside class="w-64 bg-dashboard-sidebar border-r border-white/5 flex flex-col justify-between py-8 px-6 h-full" data-purpose="navigation-sidebar">
<!-- Top Nav Items -->
<div class="space-y-8">
<nav class="space-y-6">
<!-- Chats Item -->
<a class="flex items-center space-x-3 text-gray-400 hover:text-white transition-colors group" href="#">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-sm font-medium">Chats</span>
</a>
<!-- Escanear Item -->
<a class="flex items-center space-x-3 text-gray-400 hover:text-white transition-colors group" href="#">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M12 11a2 2 0 100-4 2 2 0 000 4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M10 14h4" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-sm font-medium">Escanear Medicamento</span>
</a>
</nav>
</div>
<!-- Bottom Action -->
<div class="border-t border-white/5 pt-6">
<button class="flex items-center space-x-3 text-red-400 hover:text-red-300 transition-colors">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-sm font-medium">Sair</span>
</button>
</div>
</aside>
<!-- END: LeftSidebar -->
<!-- BEGIN: MainContent -->
<main class="flex-1 bg-main-gradient overflow-y-auto" data-purpose="main-dashboard-area" style="background: radial-gradient(circle at 50% 50%, #0a101d 0%, #03050a 100%);">
<div class="max-w-7xl mx-auto px-12 py-16">
<!-- Greeting Section -->
<section class="mb-16" data-purpose="greeting">
<h1 class="text-4xl font-semibold mb-2" style="font-size: 3rem; font-weight: 700;">Olá, [Nome] 👋</h1>
<p class="text-gray-400 text-lg">Como podemos te ajudar hoje?</p>
</section>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start" style="grid-template-columns: 1.1fr 0.9fr;">
<!-- BEGIN: ActionCards -->
<div class="space-y-6" data-purpose="primary-actions">
<!-- Card: Novo Chat -->
<button class="glow-card w-full p-8 rounded-2xl flex items-center justify-between group" style="box-shadow: 0 0 50px 10px rgba(37, 99, 235, 0.25); border: 1px solid rgba(59, 130, 246, 0.4);">
<div class="flex items-center space-x-4">
<span class="text-3xl">🤖</span>
<span class="text-xl font-medium text-gray-200">Novo Chat com IA</span>
</div>
<svg class="h-6 w-6 text-gray-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Card: Escanear -->
<button class="glow-card w-full p-8 rounded-2xl flex items-center justify-between group" style="box-shadow: 0 0 50px 10px rgba(37, 99, 235, 0.25); border: 1px solid rgba(59, 130, 246, 0.4);">
<div class="flex items-center space-x-4">
<span class="text-3xl">📷</span>
<span class="text-xl font-medium text-gray-200">Escanear Medicamento</span>
</div>
<svg class="h-6 w-6 text-gray-500 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- END: ActionCards -->
<!-- BEGIN: RecentConversations -->
<section data-purpose="recent-conversations">
<h2 class="text-2xl font-semibold mb-6 text-gray-100">Conversas Recentes</h2>
<div class="space-y-3">
<!-- List items -->
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Dúvida sobre Ibuprofeno</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Receita de Janeiro</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Receita de Janeiro</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Dúvida sobre Ibuprofeno</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Dúvida sobre Ibuprofeno</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Dúvida sobre Ibuprofeno</p>
</div>
<div class="bg-card-bg border border-card-border p-5 rounded-xl hover:bg-white/10 transition-colors cursor-pointer">
<p class="text-gray-300">Receita de Janeiro</p>
</div>
</div>
</section>
<!-- END: RecentConversations -->
</div>
</div>
</main>
<!-- END: MainContent -->
</body></html>
